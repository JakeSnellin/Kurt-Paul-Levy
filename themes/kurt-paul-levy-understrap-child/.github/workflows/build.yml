name: Build and Deploy

on:
  push:
    branches:
      - '**'  # 👈 This ensures it runs on ANY branch
  pull_request:
    branches:
      - '**'
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.4.1  # Use the version that matches your local environment

      - name: Install Dependencies
        run: npm install

      - name: Compile SCSS
        run: |
          npm run build
          npm run build:min

      - name: Commit and Push Compiled CSS
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add css/*.css
          git commit -m "CI: Compile SCSS on push" || echo "No changes to commit"
          git push